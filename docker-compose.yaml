
services:
  postgres:
    image: postgres:18.0
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: jobs_webcrawler
    volumes:
      - postgres_data:/var/lib/postgresql/18/main
    ports: 
      - "5433:5432"

  redis:
    image: redis:8.6
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
  
